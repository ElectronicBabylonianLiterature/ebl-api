version: "3"

dotenv: [".env"]

tasks:
  cp:
    cmds:
      - poetry run black ebl
      - task: lint
      - task: type
      - git add --all && git commit -m "{{.CLI_ARGS}}" && git push

  test-all:
    cmds:
      - task: format
      - task: lint
      - task: type
      - task: type-pyright
      - task: test
      - task: lint-md

  python3:
    cmds:
      - poetry run python3 {{.CLI_ARGS}}

  test:
    cmds:
      - poetry run pytest {{.CLI_ARGS}}

  test-secrets:
    cmds:
      - bash scripts/test-secret-scanning.sh

  lint-md:
    cmds:
      - npx markdownlint-cli2@0.22.1 "**/*.md" '#.venv/**' '#.pytest_cache/**'

  lint:
    cmds:
      - poetry run ruff check ebl {{.CLI_ARGS}}

  type:
    cmds:
      - poetry run pyre check

  type-pyright:
    desc: >-
      Run pyright (the checker behind Pylance) on Python files changed vs
      master. Pyre and mypy do not catch what the IDE reports, so changed
      code is gated on pyright too.
    cmds:
      - |
        BASE=origin/master
        git rev-parse --verify --quiet "$BASE" >/dev/null 2>&1 || BASE=master
        FILES=$(git diff --name-only --diff-filter=ACMR "$BASE...HEAD" -- '*.py')
        if [ -z "$FILES" ]; then
          echo "No changed Python files."
        else
          printf '%s\n' "$FILES" | xargs npx --yes pyright@1.1.411
        fi

  format:
    cmds:
      - poetry run ruff format --check ebl

  start:
    cmds:
      - poetry run waitress-serve --port=8001 --call ebl.app:get_app

  validate-fragments:
    cmds:
      - poetry run python -m ebl.io.fragments.importer validate {{.CLI_ARGS}}

  reindex-fragments:
    cmds:
      - poetry run python -m ebl.io.fragments.importer reindex {{.CLI_ARGS}}

  import-fragments:
    cmds:
      - poetry run python -m ebl.io.fragments.importer import {{.CLI_ARGS}}
